 <!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/5.0.0-alpha1/css/bootstrap.min.css"
        integrity="sha384-r4NyP46KrjDleawBgD5tp8Y7UzmLA05oM1iAEQ17CSuDqnUK2+k9luXQOfXJCJ4I" crossorigin="anonymous">

    <title>FILM POPOLARI</title>
</head>

<body>
    <div class="container">
        <div class="mt-4 ">
            <!-- <input type="text" id="page" class="form-control" placeholder="Numero di pagina" value="1"
                onchange="aggiornaPopolari()"> -->

            <select class="form-select" id="lingua" onchange="aggiornaPopolari()">
                <option value="it-IT">Italiano</option>
                <option value="en-US">Americano</option>
                <option value="fr-FR">Francese</option>
                <option value="cn-CN">Cinese</option>
            </select>
        </div>
        <nav aria-label="...">
            <ul class="pagination">
                <li class="page-item">

                    <a class="page-link" href="#" onclick="precedentePagina()">Precedente</a>
                </li>
                <li class="page-item active" id="tprecedente">
                    <a id="pprecedente" onclick="precedentePagina()" class="page-link" href="#">1</a>
                </li>
                <li class="page-item" aria-current="page" id="tcentrale">
                    <span id="pcentrale" class="page-link">2</span>
                </li>
                <li id="tsuccessiva" class="page-item">
                    <a id="psuccessiva" onclick="prossimaPagina()" class="page-link" href="#">3</a>
                </li>
                <li class="page-item">
                    <a  class="page-link" href="#" onclick="prossimaPagina()">Successivo</a>
                </li>
            </ul>
        </nav>
    </div>
    <div class="container">

        <div id="lista" class="row g-4 mt-4 p-4">
            <div id="master" class="col-6 col-md-4 d-none">
                <div class="card h-100">
                    <img class="card-img-top" alt="...">
                    <div class="card-body">
                        <h5 class="card-title"></h5>
                        <p class="card-text"></p>

                    </div>
                    <div class="card-footer">
                        <p class="card-text">
                            <small class="card-date text-body-secondary"></small>
                        </p>
                        <a href="#" class="btn btn-secondary">Scheda</a>

                    </div>
                </div>

            </div>
        </div>
    </div>


    <script src="https://stackpath.bootstrapcdn.com/bootstrap/5.0.0-alpha1/js/bootstrap.min.js"
        integrity="sha384-oesi62hOLfzrys4LxRF63OJCXdXDipiYWBnvTl9Y9/TRlw5xlKIEHpNyvvDShgf/"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.0/dist/umd/popper.min.js"
        integrity="sha384-Q6E9RHvbIyZFJoft+2mJbHaEWldlvI9IOYy5n3zV9zzTtmI3UksdQRVvoxMfooAo"
        crossorigin="anonymous"></script>

    <!-- <script src="popolari.js"></script> -->

    <script src="lib.js"></script>

    <script>
        var contatore = 1
        var psuccessiva = document.getElementById('psuccessiva');
        var pcentrale = document.getElementById('pcentrale');
        console.log(pcentrale)
        var pprecedente = document.getElementById('pprecedente');
        aggiornaTasti()

        aggiornaPopolari()

        function aggiornaPopolari() {
            // page = document.getElementById('page').value
            page = contatore
            language = document.getElementById('lingua').value
            fetch("https://api.themoviedb.org/3/movie/popular?language=" + language + "&page=" + page + "&api_key=2461e2dc84a8e379ad6a8309c585a25d")
                .then(response => response.json())
                .then(popolari => mostraPopolari(popolari))
        }

        function aggiornaTasti() {
            pcentrale.innerHTML = contatore

            tsuccessiva = document.getElementById('tsuccessiva')
            tcentrale = document.getElementById('tcentrale')
            tprecedente = document.getElementById('tprecedente')

            

            if (contatore == 1) {
                tsuccessiva.classList.remove('active')

                tcentrale.classList.remove('active')
                tprecedente.classList.add('active')
                pcentrale.innerHTML = contatore + 1
                psuccessiva.innerHTML = contatore + 2
            } else if(contatore > 499 ) {
                tcentrale.classList.remove('active')
                tsuccessiva.classList.add('active')
                pcentrale.innerHTML = contatore -1
                pprecedente.innerHTML = contatore -2
                psuccessiva.innerHTML = contatore

            }else{
                tsuccessiva.classList.remove('active')
                tcentrale.classList.add('active')
                tprecedente.classList.remove('active')
                pprecedente.innerHTML = contatore - 1
                psuccessiva.innerHTML = contatore + 1
            }


        }

        function prossimaPagina() {
            if (contatore < 500) {
                contatore = contatore + 1
            }

            aggiornaTasti()


            aggiornaPopolari()


        }

        function precedentePagina() {
            if (contatore > 1) {
                contatore = contatore - 1

            }
            aggiornaTasti()

            aggiornaPopolari()

        }




       
        


    </script>
</body>

</html>
